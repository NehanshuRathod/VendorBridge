spring:
  application:
    name: VendorBridge

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vendorbridge}
    username: ${SPRING_DATASOURCE_USERNAME:vendorbridge}
    password: ${SPRING_DATASOURCE_PASSWORD:vendorbridge_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 20
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
      timeout: 5000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:vendorbridge}
    password: ${RABBITMQ_PASSWORD:rabbitmq_secret}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

vendorbridge:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForVendorBridgeJWTTokenGenerationMustBeAtLeast64Characters!!}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900000}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin_secret}
    bucket-name: ${MINIO_BUCKET_NAME:vendorbridge}
  mail:
    from: ${MAIL_FROM:noreply@vendorbridge.com}
    enabled: ${VENDORBRIDGE_MAIL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.vendorbridge: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
