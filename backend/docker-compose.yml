version: '3.8'

services:
  vendorbridge-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vendorbridge-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vendorbridge-net

  postgres:
    image: postgres:16-alpine
    container_name: vendorbridge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vendorbridge}
      POSTGRES_USER: ${POSTGRES_USER:-vendorbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vendorbridge_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vendorbridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vendorbridge-net

  redis:
    image: redis:7-alpine
    container_name: vendorbridge-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vendorbridge-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vendorbridge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-vendorbridge}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - vendorbridge-net

  minio:
    image: minio/minio
    container_name: vendorbridge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - vendorbridge-net

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local

networks:
  vendorbridge-net:
    driver: bridge
